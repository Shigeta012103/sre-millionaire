<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRE クイズ・ミリオネア</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="vignette" aria-hidden="true"></div>
    <div class="answer-dim" id="answer-dim" aria-hidden="true"></div>

    <!-- デバッグ用（再有効化する場合はこのコメントを外し、style.css と script.js の対応箇所も戻す）
    <div class="debug-state" id="debug-state">
      <span id="debug-label"></span>
      <span class="debug-buttons" id="debug-buttons">
        <button type="button" data-mood="neutral">neutral</button>
        <button type="button" data-mood="suspense">suspense</button>
        <button type="button" data-mood="cheer">cheer</button>
        <button type="button" data-mood="wrong">wrong</button>
      </span>
    </div>
    -->

    <main class="stage">
      <img class="mc-character mood-neutral is-active" data-mood="neutral" src="assets/bear-neutral.png" alt="" aria-hidden="true" />
      <img class="mc-character mood-suspense" data-mood="suspense" src="assets/bear-sweat.png" alt="" aria-hidden="true" />
      <img class="mc-character mood-cheer" data-mood="cheer" src="assets/bear-happy.png" alt="" aria-hidden="true" />
      <img class="mc-character mood-wrong" data-mood="wrong" src="assets/bear-sad.png" alt="" aria-hidden="true" />

      <div class="question-number" id="question-number" aria-hidden="true">
        <span class="question-number-text" id="question-number-text"></span>
      </div>

      <div class="timer" id="timer" aria-hidden="true">
        <svg viewBox="0 0 100 100">
          <circle class="timer-track" cx="50" cy="50" r="45" />
          <circle class="timer-progress" id="timer-progress" cx="50" cy="50" r="45" />
        </svg>
        <span class="timer-num" id="timer-num">15</span>
      </div>

      <header class="hud" aria-label="プレイヤー情報">
        <p class="player-name" id="player-name"></p>
        <div class="prize-banner">
          <span class="prize-amount" id="prize-amount"></span>
        </div>
        <nav class="lifelines" aria-label="ライフライン">
          <button class="lifeline" id="lifeline-5050" type="button" aria-label="フィフティ・フィフティ：不正解を2つ消す">
            <span class="lifeline-icon">50:50</span>
          </button>
          <button class="lifeline" id="lifeline-phone" type="button" aria-label="オンコール仲間に電話：ヒントをもらう">
            <span class="lifeline-icon" aria-hidden="true">📞</span>
          </button>
          <button class="lifeline" id="lifeline-audience" type="button" aria-label="チームに聞く：投票結果を見る">
            <span class="lifeline-icon" aria-hidden="true">👥</span>
          </button>
        </nav>
      </header>

      <div class="character-area" aria-hidden="true"></div>

      <section class="quiz-dock" aria-label="出題">
        <div class="question-row">
          <div class="question-panel" id="question-panel">
            <p class="question-text" id="question-text"></p>
          </div>
        </div>
        <ul class="choices" id="choices" aria-label="選択肢"></ul>
      </section>
    </main>

    <div class="ladder-overlay hidden" id="ladder-overlay" aria-hidden="true">
      <div class="ladder">
        <div class="ladder-cursor" id="ladder-cursor"></div>
        <ol class="ladder-list" id="ladder-list"></ol>
      </div>
    </div>

    <div class="overlay" id="start-screen">
      <div class="overlay-card start-card">
        <p class="subtitle">全15問。信頼性の番人になれるか？</p>
        <input
          class="name-input"
          id="player-name-input"
          type="text"
          maxlength="12"
          placeholder="プレイヤー名を入力"
          aria-label="プレイヤー名"
        />
        <button class="primary-btn" id="start-btn" type="button">スタート</button>
      </div>
    </div>

    <div class="overlay hidden" id="result-screen">
      <div class="overlay-card">
        <h1 class="title" id="result-title"></h1>
        <p class="result-prize" id="result-prize"></p>
        <button class="primary-btn" id="restart-btn" type="button">もう一度挑戦</button>
      </div>
    </div>

    <div class="modal-overlay hidden" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-card">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-body" id="modal-body"></div>
        <button class="primary-btn" id="modal-close" type="button">閉じる</button>
      </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
  </body>
</html>
